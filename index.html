<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>REFLEKS // Nöbet</title>
<style>
  :root{
    --bg-0:#0b0716;
    --bg-1:#140b26;
    --line:#241a3d;
    --cyan:#33f2e8;
    --magenta:#ff2e92;
    --gold:#ffd34d;
    --danger:#ff3b3b;
    --text-dim:#8b7fb0;
    --text:#f1ecff;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--bg-0);
    font-family:'Courier New', 'Segoe UI', monospace;
    color:var(--text);
    touch-action:none;
  }

  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    max-width:520px; margin:0 auto;
    background:
      radial-gradient(ellipse at 50% -10%, #241238 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    overflow:hidden;
  }

  /* ---------- shared screen layout ---------- */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:32px 24px;
    text-align:center;
    transition:opacity .25s ease, transform .25s ease;
  }
  .screen.hidden{
    opacity:0; pointer-events:none; transform:scale(.97);
  }

  .eyebrow{
    letter-spacing:.35em; font-size:11px; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:6px;
  }

  .brand-title{
    font-family:Georgia, 'Times New Roman', serif;
    font-weight:700; font-style:italic;
    font-size:52px; line-height:1;
    letter-spacing:-1px;
    background:linear-gradient(120deg, var(--cyan), var(--magenta));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 4px 0;
    filter:drop-shadow(0 0 18px rgba(51,242,232,.35));
  }
  .brand-sub{
    color:var(--text-dim); font-size:13px; margin-bottom:40px;
    letter-spacing:.08em;
  }

  .best-score-box{
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 28px;
    margin-bottom:44px;
    background:rgba(255,255,255,0.02);
  }
  .best-score-label{ font-size:11px; letter-spacing:.25em; color:var(--text-dim); }
  .best-score-value{
    font-family:Georgia, serif; font-weight:700; font-size:40px;
    color:var(--gold);
    text-shadow:0 0 20px rgba(255,211,77,.45);
  }

  button{
    font-family:inherit; border:none; cursor:pointer;
  }

  .btn-start{
    padding:20px 56px;
    font-size:18px; font-weight:700; letter-spacing:.15em;
    color:#06121a;
    background:linear-gradient(120deg, var(--cyan), #8ffff4);
    border-radius:100px;
    box-shadow:0 0 0 1px rgba(51,242,232,.4), 0 10px 30px -6px rgba(51,242,232,.55);
    transition:transform .15s ease;
  }
  .btn-start:active{ transform:scale(.95); }

  /* ---------- gameplay screen ---------- */
  #game-screen{ justify-content:flex-start; padding:0; }

  .hud{
    width:100%;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 6px;
  }
  .hud-best{ font-size:11px; color:var(--text-dim); letter-spacing:.15em; }
  .hud-best span{ color:var(--gold); font-weight:700; }

  .hud-shield{
    font-size:16px;
    opacity:0;
    transform:scale(.5);
    transition:opacity .3s ease, transform .3s cubic-bezier(.2,1.6,.3,1), filter .2s ease;
    filter:drop-shadow(0 0 0 rgba(255,211,77,0));
  }
  .hud-shield.available{
    opacity:1;
    transform:scale(1);
    filter:drop-shadow(0 0 6px rgba(255,211,77,.8));
    animation:shieldIdle 1.8s ease-in-out infinite;
  }
  .hud-shield.spent{
    animation:none;
    opacity:.25;
    transform:scale(.85);
    filter:none;
  }
  @keyframes shieldIdle{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.12); }
  }

  .shield-banner{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%, -50%) scale(.6);
    z-index:18;
    padding:16px 30px;
    border-radius:100px;
    background:rgba(255,211,77,.14);
    border:1px solid rgba(255,211,77,.7);
    color:var(--gold);
    font-weight:700; letter-spacing:.1em; font-size:16px;
    opacity:0;
    pointer-events:none;
    box-shadow:0 0 0 rgba(255,211,77,0);
  }
  .shield-banner.show{
    animation:shieldBannerPop .9s cubic-bezier(.2,1.4,.3,1) forwards;
  }
  @keyframes shieldBannerPop{
    0%{ opacity:0; transform:translate(-50%, -50%) scale(.5); box-shadow:0 0 0 rgba(255,211,77,0); }
    18%{ opacity:1; transform:translate(-50%, -50%) scale(1.08); box-shadow:0 0 40px 10px rgba(255,211,77,.55); }
    35%{ transform:translate(-50%, -50%) scale(1); }
    78%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%, -50%) scale(1); box-shadow:0 0 0 rgba(255,211,77,0); }
  }

  .falling-obj.shatter{
    animation:shatterPop .32s ease-out forwards;
  }
  @keyframes shatterPop{
    0%{ transform:scale(1); opacity:1; }
    40%{ transform:scale(1.5); opacity:1; filter:brightness(2); }
    100%{ transform:scale(2.1); opacity:0; }
  }

  .targets-row{
    width:100%;
    display:flex; justify-content:center; align-items:center;
    gap:8px;
    padding:6px 10px 18px;
  }

  .target{
    width:26px; height:26px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff 0%, var(--cyan) 45%, #0d3a38 100%);
    box-shadow:0 0 10px 2px rgba(51,242,232,.55);
    flex:0 0 auto;
    transition:opacity .22s ease, box-shadow .22s ease, background .22s ease;
  }
  .target.used{
    opacity:.16;
    box-shadow:none;
    background:radial-gradient(circle at 35% 30%, #2b2b3a 0%, #17101f 60%, #0d0a16 100%);
  }
  .target.refill{
    animation:targetRefill .42s cubic-bezier(.2,1.6,.3,1) both;
  }
  @keyframes targetRefill{
    0%{ transform:scale(.25); opacity:0; }
    55%{ transform:scale(1.25); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }

  .score-wrap{
    flex:1; width:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative;
  }
  .score-value{
    font-family:Georgia, serif; font-weight:700;
    font-size:88px; line-height:1;
    color:var(--text);
    text-shadow:0 0 30px rgba(51,242,232,.25);
    transition:transform .12s ease;
    pointer-events:none;
    position:relative; z-index:1;
  }
  .score-caption{
    font-size:11px; letter-spacing:.3em; color:var(--text-dim); margin-top:8px;
    pointer-events:none;
    position:relative; z-index:1;
  }

  #fall-layer{
    position:absolute; inset:0;
    pointer-events:none;
    z-index:2;
  }

  .falling-obj{
    position:absolute;
    width:40px; height:40px; border-radius:50%;
    pointer-events:auto;
    background:transparent;
    transition:transform .12s cubic-bezier(.2,0,0,1), opacity .12s ease;
    will-change:transform, top;
    touch-action:none;
  }
  .falling-obj::before{
    content:"";
    position:absolute; inset:7px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffffff 0%, var(--cyan) 45%, #0d3a38 100%);
    box-shadow:0 0 10px 2px rgba(51,242,232,.55);
  }
  .falling-obj.pop{
    transform:scale(0);
    opacity:0;
  }

  .floor-line{
    position:absolute; left:0; right:0; bottom:0;
    height:4px;
    background:var(--line);
    box-shadow:none;
    transition:box-shadow .18s ease, background .18s ease;
    pointer-events:none;
    z-index:1;
  }
  .floor-line.burn{
    background:var(--danger);
    box-shadow:0 0 24px 8px rgba(255,59,59,.85), 0 0 60px 20px rgba(255,59,59,.4);
  }

  .record-flash{
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 30%, rgba(255,211,77,.55), transparent 70%);
    opacity:0;
    pointer-events:none;
  }
  .record-flash.fire{
    animation:flashPulse .55s ease-out;
  }
  @keyframes flashPulse{
    0%{ opacity:0; }
    15%{ opacity:1; }
    100%{ opacity:0; }
  }

  /* ---------- countdown overlay ---------- */
  .countdown-overlay{
    position:absolute; inset:0;
    z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:rgba(11,7,22,.82);
    backdrop-filter:blur(2px);
    transition:opacity .2s ease;
  }
  .countdown-overlay.hidden{
    opacity:0; pointer-events:none;
  }
  .countdown-number{
    font-family:Georgia, serif; font-weight:700;
    font-size:140px; line-height:1;
    color:var(--cyan);
    text-shadow:0 0 40px rgba(51,242,232,.6);
  }
  .countdown-number.go{
    font-size:56px; letter-spacing:.08em;
    color:var(--gold);
    text-shadow:0 0 40px rgba(255,211,77,.65);
  }
  .countdown-number.pop{
    animation:countdownPop .55s cubic-bezier(.2,1.6,.3,1);
  }
  @keyframes countdownPop{
    0%{ transform:scale(.4); opacity:0; }
    35%{ transform:scale(1.15); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }

  /* ---------- level-up banner ---------- */
  .level-up-banner{
    position:absolute;
    top:70px; left:50%;
    transform:translate(-50%, -14px);
    z-index:15;
    padding:10px 26px;
    border-radius:100px;
    background:rgba(51,242,232,.12);
    border:1px solid rgba(51,242,232,.55);
    color:var(--cyan);
    font-weight:700; letter-spacing:.15em; font-size:13px;
    opacity:0;
    pointer-events:none;
  }
  .level-up-banner.show{
    animation:levelUpBanner 1.5s ease forwards;
  }
  @keyframes levelUpBanner{
    0%{ opacity:0; transform:translate(-50%, -14px); }
    15%{ opacity:1; transform:translate(-50%, 0); }
    80%{ opacity:1; transform:translate(-50%, 0); }
    100%{ opacity:0; transform:translate(-50%, -14px); }
  }

  /* ---------- game over screen ---------- */
  #gameover-screen .eyebrow{ margin-bottom:2px; }
  .final-score{
    font-family:Georgia, serif; font-weight:700;
    font-size:96px; line-height:1;
    color:var(--text);
    margin:6px 0 6px;
  }
  .final-caption{
    font-size:12px; color:var(--text-dim); letter-spacing:.2em; margin-bottom:26px;
  }

  .new-record-badge{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 22px;
    border-radius:100px;
    background:rgba(255,211,77,.12);
    border:1px solid rgba(255,211,77,.6);
    color:var(--gold);
    font-weight:700; letter-spacing:.12em; font-size:13px;
    margin-bottom:30px;
    opacity:0; transform:translateY(8px) scale(.9);
  }
  .new-record-badge.show{
    animation:badgeIn .5s cubic-bezier(.2,1.4,.4,1) forwards, badgeGlow 1.4s ease-in-out .5s infinite;
  }
  @keyframes badgeIn{
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes badgeGlow{
    0%,100%{ box-shadow:0 0 10px 0 rgba(255,211,77,.3); }
    50%{ box-shadow:0 0 26px 6px rgba(255,211,77,.55); }
  }

  .btn-replay{
    padding:22px 64px;
    font-size:19px; font-weight:700; letter-spacing:.15em;
    color:#04201c;
    background:linear-gradient(120deg, var(--cyan), #7dffe0);
    border-radius:100px;
    box-shadow:0 0 0 1px rgba(51,242,232,.5), 0 0 30px 6px rgba(51,242,232,.4);
    animation:pulseBtn 1.15s ease-in-out infinite;
  }
  .btn-replay:active{ animation:none; transform:scale(.94); }
  .btn-replay.gold{
    color:#241503;
    background:linear-gradient(120deg, var(--gold), #fff3c4);
    box-shadow:0 0 0 1px rgba(255,211,77,.6), 0 0 45px 12px rgba(255,211,77,.55);
  }
  @keyframes pulseBtn{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.055); }
  }

  .footnote{
    position:absolute; bottom:14px; left:0; right:0;
    text-align:center; font-size:10px; color:var(--text-dim); letter-spacing:.15em;
    opacity:.6;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ================= START SCREEN ================= -->
  <div id="start-screen" class="screen">
    <div class="eyebrow">TEK ELİN NEFES ALIR</div>
    <h1 class="brand-title">REFLEKS</h1>
    <div class="brand-sub">DÜŞENİ YAKALA · KAÇIRMA</div>

    <div class="best-score-box">
      <div class="best-score-label">EN YÜKSEK SKOR</div>
      <div class="best-score-value" id="start-best">0</div>
    </div>

    <button class="btn-start" id="btn-start">BAŞLA</button>
    <div class="footnote">Sesi açık tut · Parmağını hazır tut</div>
  </div>

  <!-- ================= GAME SCREEN ================= -->
  <div id="game-screen" class="screen hidden">
    <div class="countdown-overlay hidden" id="countdown-overlay">
      <div class="countdown-number" id="countdown-number">3</div>
    </div>

    <div class="hud">
      <div class="hud-best">REKOR <span id="hud-best">0</span></div>
      <div class="hud-shield" id="hud-shield">🛡</div>
      <div class="hud-best" id="hud-level">SEVİYE 1</div>
    </div>

    <div class="targets-row" id="targets-row"></div>

    <div class="level-up-banner" id="level-up-banner">SEVİYE 2</div>
    <div class="shield-banner" id="shield-banner">🛡 KALKAN DEVREDE!</div>

    <div class="score-wrap">
      <div id="fall-layer"></div>
      <div class="score-value" id="score-value">0</div>
      <div class="score-caption">SKOR</div>
      <div class="floor-line" id="floor-line"></div>
      <div class="record-flash" id="record-flash"></div>
    </div>
  </div>

  <!-- ================= GAME OVER SCREEN ================= -->
  <div id="gameover-screen" class="screen hidden">
    <div class="eyebrow">OYUN BİTTİ</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-caption">BU ELDE KAZANILAN SKOR</div>

    <div class="new-record-badge" id="record-badge">🏆 YENİ REKOR!</div>

    <button class="btn-replay" id="btn-replay">YENİDEN OYNA</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     STATE
  ============================================================ */
  const STORAGE_KEY = "refleks_best_score_v1";
  let bestScore = parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10) || 0;

  let score = 0;
  let level = 1;
  let running = false;
  let recordAlreadyCelebrated = false;

  const NUM_TARGETS = 10;
  let targetEls = [];

  // level/pair spawn model:
  // each level drops all 10 top circles, in 5 pairs. Within a pair, the two
  // balls drop with a short gap (both can be airborne at once by design).
  // The NEXT pair never starts until both balls of the current pair are
  // resolved (hit) or the game ends (a miss). When a level's 10 balls are
  // all cleared, the level advances and a fresh shuffled set of 10 begins.
  let levelQueue = [];       // remaining target indices for the current level
  let activeFallers = new Set(); // up to 2 concurrently falling records
  let pairResolvedCount = 0; // hits registered in the current pair (0,1,2)
  let spawnTimer = null;     // pending setTimeout id for next spawn/pair/level

  // one-time shield: awarded once after level 3 is completed (score 30).
  // Saves the player from exactly one miss for the rest of this game, then
  // never recharges.
  let shieldAwarded = false;  // has the award already happened this game?
  let shieldAvailable = false; // currently holding an unused charge

  /* ============================================================
     DOM REFS
  ============================================================ */
  const startScreen   = document.getElementById("start-screen");
  const gameScreen    = document.getElementById("game-screen");
  const overScreen    = document.getElementById("gameover-screen");

  const startBestEl   = document.getElementById("start-best");
  const hudBestEl      = document.getElementById("hud-best");
  const hudLevelEl     = document.getElementById("hud-level");
  const scoreValueEl  = document.getElementById("score-value");
  const finalScoreEl  = document.getElementById("final-score");
  const recordBadgeEl = document.getElementById("record-badge");
  const btnStart      = document.getElementById("btn-start");
  const btnReplay     = document.getElementById("btn-replay");
  const targetsRow    = document.getElementById("targets-row");
  const fallLayer     = document.getElementById("fall-layer");
  const floorLine     = document.getElementById("floor-line");
  const recordFlash   = document.getElementById("record-flash");
  const countdownOverlay = document.getElementById("countdown-overlay");
  const countdownNumberEl = document.getElementById("countdown-number");
  const levelUpBanner  = document.getElementById("level-up-banner");
  const shieldBanner   = document.getElementById("shield-banner");
  const hudShieldEl    = document.getElementById("hud-shield");

  /* ============================================================
     WEB AUDIO — synthesized SFX, no external files
  ============================================================ */
  let audioCtx = null;
  function ensureAudio(){
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }

  function playTone({freq=440, duration=0.12, type="sine", startGain=0.25, endGain=0.0001, delay=0}){
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(startGain, t0);
    gain.gain.exponentialRampToValueAtTime(endGain, t0 + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.02);
  }

  function sfxHit(){
    // short bright tick
    playTone({freq:1180, duration:0.08, type:"triangle", startGain:0.22});
    playTone({freq:1760, duration:0.06, type:"sine", startGain:0.12, delay:0.01});
  }

  function sfxGameOver(){
    // low thud, descending
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(180, t0);
    osc.frequency.exponentialRampToValueAtTime(45, t0 + 0.5);
    gain.gain.setValueAtTime(0.3, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.55);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.6);
  }

  function sfxRecord(){
    // celebratory ascending arpeggio
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((f, i)=>{
      playTone({freq:f, duration:0.18, type:"triangle", startGain:0.2, delay:i*0.07});
    });
  }

  function sfxCountdownBeep(n){
    // rising pitch as the count drops (3 -> 2 -> 1) builds tension
    const freqMap = { 3:392.0, 2:493.88, 1:587.33 };
    playTone({freq:freqMap[n] || 440, duration:0.16, type:"square", startGain:0.2});
  }

  function sfxStartChime(){
    // bright two-note "go!" cue
    playTone({freq:880,  duration:0.12, type:"triangle", startGain:0.28});
    playTone({freq:1318.5, duration:0.22, type:"triangle", startGain:0.24, delay:0.09});
  }

  function sfxLevelUp(){
    playTone({freq:660, duration:0.14, type:"sine", startGain:0.22});
    playTone({freq:990, duration:0.18, type:"sine", startGain:0.2, delay:0.09});
  }

  function sfxShield(){
    // a bright metallic "clink" followed by a warm, relieved shimmer
    playTone({freq:1760, duration:0.07, type:"square", startGain:0.16});
    playTone({freq:698.46, duration:0.16, type:"triangle", startGain:0.22, delay:0.05});
    playTone({freq:1046.5, duration:0.28, type:"sine", startGain:0.2, delay:0.11});
  }

  /* ============================================================
     DIFFICULTY CURVE
  ============================================================ */
  // returns {fallDuration(ms), spawnGap(ms)} — spawnGap is the short gap
  // between the two balls of one pair.
  // returns {fallDuration(ms), spawnGap(ms)} — spawnGap is the short gap
  // between the two balls of one pair.
  //
  // Smooth, continuous curve — no hard jumps between tiers. Both values
  // ease from a forgiving start toward a fast floor, reaching properly
  // "fast" territory around level 8 (score ~80) instead of the old abrupt
  // jump that used to land around level 3-4.
  function getDifficulty(currentScore){
    const s = currentScore;

    const fallStart = 2200, fallFloor = 550, fallK = 0.984;
    const fallDuration = fallFloor + (fallStart - fallFloor) * Math.pow(fallK, s);

    const gapStart = 300, gapFloor = 120, gapK = 0.9645;
    const spawnGap = gapFloor + (gapStart - gapFloor) * Math.pow(gapK, s);

    return { fallDuration, spawnGap };
  }

  // the pause BETWEEN pairs is deliberately longer and slightly randomized —
  // the player knows two more balls are coming, but not which two circles
  // or exactly when, which is what keeps it tense.
  function getBetweenPairDelay(spawnGap){
    const base = spawnGap * 4;
    const jitter = Math.random() * spawnGap * 2.5;
    return base + jitter;
  }

  // Fisher–Yates shuffle of the 10 target indices for one fresh level
  function shuffledIndices(){
    const arr = Array.from({length:NUM_TARGETS}, (_, i)=>i);
    for (let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ============================================================
     BUILD TOP TARGET ROW (10 static circles)
  ============================================================ */
  function buildTargetsRow(){
    targetsRow.innerHTML = "";
    targetEls = [];
    for (let i=0; i<NUM_TARGETS; i++){
      const t = document.createElement("div");
      t.className = "target";
      targetsRow.appendChild(t);
      targetEls.push(t);
    }
  }

  /* ============================================================
     SCREEN SWITCHING
  ============================================================ */
  function showScreen(el){
    [startScreen, gameScreen, overScreen].forEach(s=>{
      if (s === el) s.classList.remove("hidden");
      else s.classList.add("hidden");
    });
  }

  /* ============================================================
     GAME LIFECYCLE
  ============================================================ */
  function updateBestDisplays(){
    startBestEl.textContent = bestScore;
    hudBestEl.textContent = bestScore;
  }

  function startGame(){
    ensureAudio();
    score = 0;
    level = 1;
    running = false; // stays false until the countdown finishes
    recordAlreadyCelebrated = false;
    scoreValueEl.textContent = "0";
    scoreValueEl.style.transform = "scale(1)";
    floorLine.classList.remove("burn");
    fallLayer.innerHTML = "";
    activeFallers.forEach(r => { if (r.raf) cancelAnimationFrame(r.raf); });
    activeFallers.clear();
    pairResolvedCount = 0;
    clearTimeout(spawnTimer);
    levelQueue = shuffledIndices();
    hudLevelEl.textContent = "SEVİYE 1";
    shieldAwarded = false;
    shieldAvailable = false;
    hudShieldEl.classList.remove("available", "spent");
    updateBestDisplays();
    buildTargetsRow();
    showScreen(gameScreen);

    runCountdown(()=>{
      running = true;
      spawnPair();
    });
  }

  // Audible 3-2-1 countdown, then a start chime, then hand control to onDone.
  function runCountdown(onDone){
    countdownOverlay.classList.remove("hidden");
    countdownNumberEl.classList.remove("go");

    const showBeat = (label, isGo)=>{
      countdownNumberEl.classList.toggle("go", !!isGo);
      countdownNumberEl.textContent = label;
      countdownNumberEl.classList.remove("pop");
      void countdownNumberEl.offsetWidth; // restart pop animation
      countdownNumberEl.classList.add("pop");
    };

    let n = 3;
    showBeat(n, false);
    sfxCountdownBeep(n);

    const tick = setInterval(()=>{
      n -= 1;
      if (n > 0){
        showBeat(n, false);
        sfxCountdownBeep(n);
      } else if (n === 0){
        showBeat("BAŞLA!", true);
        sfxStartChime();
      } else {
        clearInterval(tick);
        countdownOverlay.classList.add("hidden");
        onDone();
      }
    }, 700);
  }

  function endGame(){
    if (!running) return;
    running = false;
    clearTimeout(spawnTimer);
    Array.from(activeFallers).forEach(r => { removeFaller(r); r.el.remove(); });

    sfxGameOver();
    floorLine.classList.add("burn");

    const isNewRecord = score > bestScore;
    if (isNewRecord){
      bestScore = score;
      localStorage.setItem(STORAGE_KEY, String(bestScore));
    }

    finalScoreEl.textContent = String(score);

    setTimeout(()=>{
      showScreen(overScreen);
      recordBadgeEl.classList.remove("show");
      btnReplay.classList.remove("gold");
      if (isNewRecord){
        recordBadgeEl.classList.add("show");
        btnReplay.classList.add("gold");
      }
    }, 320); // fast but lets the burn flash register — no time to overthink
  }

  /* ============================================================
     SPAWNING LOGIC — pairs, levels
     Each level shuffles all 10 target indices once, then consumes
     them two at a time. Within a pair, ball A drops, then ball B
     drops shortly after (short gap). The next pair only starts once
     BOTH balls of the current pair have been hit. Once a level's 10
     balls are all cleared, the level advances and a fresh shuffled
     set of 10 begins after a short "level up" pause.
  ============================================================ */
  function spawnPair(){
    if (!running) return;
    if (levelQueue.length < 2){
      // safety net — shouldn't happen since we always consume in twos
      levelQueue = shuffledIndices();
    }
    pairResolvedCount = 0;
    const idxA = levelQueue.shift();
    const idxB = levelQueue.shift();
    const { spawnGap } = getDifficulty(score);

    spawnFaller(idxA);
    clearTimeout(spawnTimer);
    spawnTimer = setTimeout(()=>{
      if (running) spawnFaller(idxB);
    }, spawnGap);
  }

  function completeLevel(){
    level += 1;
    hudLevelEl.textContent = "SEVİYE " + level;
    levelUpBanner.textContent = "SEVİYE " + level;
    levelUpBanner.classList.remove("show");
    void levelUpBanner.offsetWidth;
    levelUpBanner.classList.add("show");
    sfxLevelUp();

    // one-time shield: granted the moment level 3 is completed (score 30),
    // never granted again for the rest of this game
    if (!shieldAwarded && level >= 4){
      shieldAwarded = true;
      shieldAvailable = true;
      hudShieldEl.classList.remove("spent");
      hudShieldEl.classList.add("available");
    }

    // refill the top row — all 10 slots pop back in, staggered left to right,
    // so the player visibly sees the fresh set of 10 arrive for this level
    targetEls.forEach((el, i)=>{
      el.classList.remove("refill");
      setTimeout(()=>{
        el.classList.remove("used");
        void el.offsetWidth;
        el.classList.add("refill");
      }, i * 55);
    });

    levelQueue = shuffledIndices();
    clearTimeout(spawnTimer);
    // the player waits out the refill + banner before the next pair falls
    spawnTimer = setTimeout(spawnPair, 1500);
  }

  function spawnFaller(targetIndex){
    if (!running) return;
    const srcEl = targetEls[targetIndex];
    srcEl.classList.add("used"); // that top slot is now empty — this exact ball is falling
    const srcRect = srcEl.getBoundingClientRect();
    const layerRect = fallLayer.getBoundingClientRect();

    const el = document.createElement("div");
    el.className = "falling-obj";
    const size = 40; // includes the generous invisible tap padding around the visible dot
    const startLeft = srcRect.left - layerRect.left + (srcRect.width - size)/2;
    el.style.left = startLeft + "px";
    el.style.top = "-46px";
    fallLayer.appendChild(el);

    const record = { el, resolved:false, raf:null };
    activeFallers.add(record);

    const { fallDuration } = getDifficulty(score);
    const floorY = layerRect.height - 10; // just above floor line

    let startTime = performance.now();
    let pausedAt = null;

    function step(now){
      if (!running || record.resolved) return;
      const elapsed = now - startTime;
      const progress = Math.min(1, elapsed / fallDuration);
      const currentTop = -46 + progress * (floorY + 46);
      el.style.top = currentTop + "px";

      if (progress >= 1){
        onMiss(record);
        return;
      }
      record.raf = requestAnimationFrame(step);
    }
    record.raf = requestAnimationFrame(step);

    // Used by the one-time shield's global freeze: pause holds this ball's
    // fall in place; resume shifts startTime forward by however long it was
    // paused, so it picks up exactly where it left off.
    record.pause = function(){
      if (record.resolved) return;
      if (record.raf) cancelAnimationFrame(record.raf);
      pausedAt = performance.now();
    };
    record.resume = function(){
      if (record.resolved || pausedAt === null) return;
      startTime += performance.now() - pausedAt;
      pausedAt = null;
      record.raf = requestAnimationFrame(step);
    };

    // pointerdown on the ball itself; a slightly generous hit-test also
    // catches fast taps that land a few pixels off thanks to the CSS
    // pointer-events fixes (score text / floor line no longer intercept taps).
    el.addEventListener("pointerdown", (e)=>{
      e.preventDefault();
      e.stopPropagation();
      onHit(record);
    }, { passive:false });
  }

  function removeFaller(record){
    if (record.raf) cancelAnimationFrame(record.raf);
    record.resolved = true;
    activeFallers.delete(record);
  }

  // Briefly pauses every ball currently on screen — used the instant the
  // shield triggers, so the player gets a real reaction window instead of
  // an unrelated second ball reaching the floor mid-celebration.
  function globalFreeze(duration){
    const frozen = Array.from(activeFallers).filter(r => !r.resolved);
    frozen.forEach(r => r.pause());
    setTimeout(()=>{
      frozen.forEach(r => { if (!r.resolved) r.resume(); });
    }, duration);
  }

  // Shared "this pair just got one ball resolved" bookkeeping, used by both
  // a normal hit and a shield-saved miss (the only difference is scoring).
  function advancePairProgress(){
    pairResolvedCount += 1;
    if (pairResolvedCount >= 2){
      if (levelQueue.length === 0){
        completeLevel();
      } else {
        const { spawnGap } = getDifficulty(score);
        const delay = getBetweenPairDelay(spawnGap);
        clearTimeout(spawnTimer);
        spawnTimer = setTimeout(spawnPair, delay);
      }
    }
  }

  function onHit(record){
    if (record.resolved || !running) return;
    removeFaller(record);

    record.el.classList.add("pop");
    const elToRemove = record.el;
    setTimeout(()=>{ elToRemove.remove(); }, 130);

    sfxHit();
    incrementScore();
    advancePairProgress();
  }

  function onMiss(record){
    if (record.resolved || !running) return;

    if (shieldAvailable){
      // the one-time save: this ball shatters instead of ending the game,
      // scores nothing, and the rest of the level continues untouched
      shieldAvailable = false;
      hudShieldEl.classList.remove("available");
      hudShieldEl.classList.add("spent");

      removeFaller(record);
      record.el.classList.add("shatter");
      const elToRemove = record.el;
      setTimeout(()=>{ elToRemove.remove(); }, 340);

      sfxShield();
      shieldBanner.classList.remove("show");
      void shieldBanner.offsetWidth;
      shieldBanner.classList.add("show");

      // brief global freeze gives any other airborne ball (e.g. the rest
      // of this pair) a genuine, fair reaction window
      globalFreeze(220);

      advancePairProgress();
      return;
    }

    removeFaller(record);
    record.el.remove();
    endGame();
  }

  function incrementScore(){
    score += 1;
    scoreValueEl.textContent = String(score);
    scoreValueEl.style.transform = "scale(1.12)";
    setTimeout(()=>{ scoreValueEl.style.transform = "scale(1)"; }, 120);

    if (!recordAlreadyCelebrated && score > bestScore){
      recordAlreadyCelebrated = true;
      sfxRecord();
      recordFlash.classList.remove("fire");
      // force reflow to restart animation
      void recordFlash.offsetWidth;
      recordFlash.classList.add("fire");
    }
  }


  /* ============================================================
     EVENT WIRING
  ============================================================ */
  // Fallback hit-test: mobile browsers occasionally drop a pointerdown on a
  // small, fast-moving element. Listening on the whole score area and
  // checking the tap against the live ball rect (with a small forgiveness
  // margin) makes hits register reliably even on imperfect taps.
  const scoreWrapEl = document.querySelector(".score-wrap");
  scoreWrapEl.addEventListener("pointerdown", (e)=>{
    if (!running || activeFallers.size === 0) return;
    const margin = 14;
    for (const record of activeFallers){
      if (record.resolved) continue;
      const rect = record.el.getBoundingClientRect();
      const withinX = e.clientX >= rect.left - margin && e.clientX <= rect.right + margin;
      const withinY = e.clientY >= rect.top - margin && e.clientY <= rect.bottom + margin;
      if (withinX && withinY){
        e.preventDefault();
        onHit(record);
        break;
      }
    }
  }, { passive:false });

  btnStart.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    startGame();
  });

  btnReplay.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    startGame();
  });

  updateBestDisplays();
  showScreen(startScreen);

})();
</script>
</body>
</html>
